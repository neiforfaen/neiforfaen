pre-commit:
  jobs:
    - run: bunx ultracite check
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
      stage_fixed: true
    - run: bun run test
      glob:
        - "tests/**/*.test.ts"
        - "tests/**/*.browser.test.tsx"
      stage_fixed: true
